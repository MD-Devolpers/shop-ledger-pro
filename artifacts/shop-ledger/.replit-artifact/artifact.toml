kind = "web"
previewPath = "/"
title = "Daily Shop Ledger"
version = "1.0.0"
id = "artifacts/shop-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20981

[services.development]
run = "pnpm --filter @workspace/shop-ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shop-ledger", "run", "build" ]
publicDir = "artifacts/shop-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20981"
BASE_PATH = "/"
